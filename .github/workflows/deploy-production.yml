# Deploy Production — EventKart
#
# Deploys all Railway services to the production environment.
# Requires GitHub environment protection rules (manual reviewers).
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN          — Railway API token (production project)
#   RAILWAY_PROJECT_ID     — Railway project ID for production
#   MIGRATION_DATABASE_URL — Direct PostgreSQL connection string (bypasses PgBouncer)
#
# Required GitHub Variables:
#   PRODUCTION_API_URL — Public hostname of the production API (e.g. api.eventkart.com)
#   PRODUCTION_WEB_URL — Public hostname of the production web app (e.g. eventkart.com)

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm production deployment"
        required: true
        type: string
      skip_migration:
        description: "Skip database migration (code-only deploy)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Gate: safety check for manual dispatches ──────────────────────
  gate:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'yes'
        run: |
          echo "::error::Deployment not confirmed. Input 'confirm' must be 'yes'."
          exit 1

      - name: Log deployment trigger
        run: |
          echo "::notice::Production deployment triggered by ${{ github.actor }}"
          echo "::notice::Ref: ${{ github.ref }}"
          echo "::notice::SHA: ${{ github.sha }}"

  # ── Job 1: Database Migration ─────────────────────────────────────
  migrate:
    name: Run Migrations
    needs: gate
    if: >-
      !(github.event_name == 'workflow_dispatch' &&
        github.event.inputs.skip_migration == 'true')
    runs-on: ubuntu-latest
    environment: production

    env:
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @repo/db db:migrate:run

  # ── Job 2: Deploy Services to Railway ─────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: migrate
    if: ${{ !cancelled() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy API service
        run: |
          echo "::notice::Deploying API service to production"
          pnpm dlx @railway/cli up --service api --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Web service
        run: |
          echo "::notice::Deploying Web service to production"
          pnpm dlx @railway/cli up --service web --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Worker service
        run: |
          echo "::notice::Deploying Worker service to production"
          pnpm dlx @railway/cli up --service worker --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ── Job 3: Health Check ───────────────────────────────────────────
  health-check:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for services to start
        run: sleep 60

      - name: Check API health
        run: curl -f https://${{ vars.PRODUCTION_API_URL }}/health

      - name: Check Web app
        run: curl -f https://${{ vars.PRODUCTION_WEB_URL }}

      - name: Annotate successful deployment
        run: |
          echo "::notice::Production deployment verified successfully"
          echo "::notice::Deployed by ${{ github.actor }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "::notice::Commit: ${{ github.sha }}"
