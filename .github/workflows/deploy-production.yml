# Deploy Production — EventKart
#
# Production deploys remain on GitHub Actions (not Railway native autodeploy)
# because Railway's GitHub integration does not yet support tag-filtered
# triggers — production must only ship on `v*` tags, never on every push to
# `main`. See infrastructure-railway-deployment.md §D6 / RISK-007.
#
# Database migrations are NOT run from this workflow. They are executed by
# Railway's `preDeployCommand` on the api service (railway.api.json), which
# runs after the build and before the new container takes traffic. This keeps
# the migration co-located with the code that depends on it and avoids a
# split-brain between CI and Railway state.
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN      — Railway API token (production project)
#   RAILWAY_PROJECT_ID — Railway project ID for production
#
# Required GitHub Variables:
#   PRODUCTION_API_URL — Public hostname of the production API (e.g. api.eventkart.com)
#   PRODUCTION_WEB_URL — Public hostname of the production web app (e.g. eventkart.com)

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm production deployment"
        required: true
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Gate: safety check for manual dispatches ──────────────────────
  gate:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'yes'
        run: |
          echo "::error::Deployment not confirmed. Input 'confirm' must be 'yes'."
          exit 1

      - name: Log deployment trigger
        run: |
          echo "::notice::Production deployment triggered by ${{ github.actor }}"
          echo "::notice::Ref: ${{ github.ref }}"
          echo "::notice::SHA: ${{ github.sha }}"

  # ── Job: Deploy Services to Railway ───────────────────────────────
  # Railway runs the api service's `preDeployCommand` (drizzle migrations)
  # automatically as part of the api rollout — there is no separate migration
  # job here.
  deploy:
    name: Deploy to Railway
    needs: gate
    runs-on: ubuntu-latest
    environment: production

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Deploy API service
        run: |
          echo "::notice::Deploying API service to production"
          pnpm dlx @railway/cli up --service api --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Web service
        run: |
          echo "::notice::Deploying Web service to production"
          pnpm dlx @railway/cli up --service web --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Worker service
        run: |
          echo "::notice::Deploying Worker service to production"
          pnpm dlx @railway/cli up --service worker --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ── Job: Health Check ─────────────────────────────────────────────
  health-check:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for services to start
        # Production builds (no Turbo cache, full image build) typically take
        # longer than staging — 120s gives the api preDeployCommand + web +
        # worker rollout room to complete.
        run: sleep 120

      - name: Check API health
        run: curl -fsS --retry 5 --retry-delay 10 --retry-all-errors https://${{ vars.PRODUCTION_API_URL }}/health

      - name: Check Web app
        run: curl -fsS --retry 5 --retry-delay 10 --retry-all-errors https://${{ vars.PRODUCTION_WEB_URL }}

      - name: Annotate successful deployment
        run: |
          echo "::notice::Production deployment verified successfully"
          echo "::notice::Deployed by ${{ github.actor }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "::notice::Commit: ${{ github.sha }}"
