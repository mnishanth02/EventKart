name: Infra CI

on:
  pull_request:
    paths:
      - "railway.*.json"
      - "apps/*/Dockerfile"
      - ".dockerignore"

jobs:
  validate-railway-config:
    name: Validate Railway config files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Fetch Railway JSON schema
        run: curl -fsSL -o /tmp/railway.schema.json https://railway.com/railway.schema.json

      - name: Validate railway.api.json
        run: pnpm dlx ajv-cli@5 validate -s /tmp/railway.schema.json -d railway.api.json --strict=false

      - name: Validate railway.web.json
        run: pnpm dlx ajv-cli@5 validate -s /tmp/railway.schema.json -d railway.web.json --strict=false

      - name: Validate railway.worker.json
        run: pnpm dlx ajv-cli@5 validate -s /tmp/railway.schema.json -d railway.worker.json --strict=false

  validate-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api/Dockerfile
          ignore: DL3018,DL3008
      - name: Lint web Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/web/Dockerfile
          ignore: DL3018,DL3008
