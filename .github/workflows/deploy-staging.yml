# Deploy Staging — EventKart
#
# Deploys all Railway services to the staging environment.
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN          — Railway API token (staging project)
#   RAILWAY_PROJECT_ID     — Railway project ID for staging
#   MIGRATION_DATABASE_URL — Direct PostgreSQL connection string (bypasses PgBouncer)
#
# Required GitHub Variables:
#   STAGING_API_URL — Public hostname of the staging API (e.g. api-staging.eventkart.com)
#   STAGING_WEB_URL — Public hostname of the staging web app (e.g. staging.eventkart.com)

name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ── Gate: only proceed when CI succeeded ──────────────────────────
  gate:
    name: Check CI result
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed or manual trigger — proceeding with staging deploy"

  # ── Job 1: Database Migration ─────────────────────────────────────
  migrate:
    name: Run Migrations
    needs: gate
    runs-on: ubuntu-latest
    environment: staging

    env:
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @repo/db db:migrate:run

  # ── Job 2: Deploy Services to Railway ─────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: migrate
    runs-on: ubuntu-latest
    environment: staging

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy API service
        run: pnpm dlx @railway/cli up --service api --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Web service
        run: pnpm dlx @railway/cli up --service web --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Worker service
        run: pnpm dlx @railway/cli up --service worker --detach
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ── Job 3: Health Check ───────────────────────────────────────────
  health-check:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for services to start
        run: sleep 60

      - name: Check API health
        run: curl -f https://${{ vars.STAGING_API_URL }}/health

      - name: Check Web app
        run: curl -f https://${{ vars.STAGING_WEB_URL }}
