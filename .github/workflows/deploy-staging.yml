# Deploy Staging — EventKart
#
# Staging deploys are triggered by Railway's native GitHub autodeploy on the
# `main` branch with the "Wait for CI" check enabled. Railway pulls the latest
# commit, builds each service from its `railway.*.json` config, and runs the
# api service's `preDeployCommand` (which executes the database migrations)
# before swapping traffic.
#
# This GitHub workflow is intentionally thin: it ONLY verifies that the
# resulting Railway deployment is healthy. It does not run migrations and it
# does not invoke `railway up` — both responsibilities live on Railway now.
#
# Required GitHub Variables:
#   STAGING_API_URL — Public hostname of the staging API (e.g. api-staging.eventkart.com)
#   STAGING_WEB_URL — Public hostname of the staging web app (e.g. staging.eventkart.com)

name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  health-check:
    name: Verify Staging Deployment
    runs-on: ubuntu-latest
    # Run on manual dispatch, or only when the upstream CI run succeeded.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Wait for Railway autodeploy to complete
        # Railway queues the build after `Wait for CI` clears, then builds and
        # rolls out api/web/worker. 90s gives enough headroom for a typical
        # staging build + container swap.
        run: sleep 90

      - name: Check API health
        run: curl -fsS --retry 5 --retry-delay 10 --retry-all-errors https://${{ vars.STAGING_API_URL }}/health

      - name: Check Web app
        run: curl -fsS --retry 5 --retry-delay 10 --retry-all-errors https://${{ vars.STAGING_WEB_URL }}

      - name: Annotate successful verification
        run: |
          echo "::notice::Staging deployment verified successfully"
          echo "::notice::Commit: ${{ github.sha }}"
